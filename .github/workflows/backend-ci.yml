name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck Backend Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Nx projects
        run: pnpm nx show projects

      - name: Typecheck workspace
        run: pnpm tsc -p tsconfig.json --noEmit

      - name: Typecheck each backend app
        run: |
          set -euo pipefail
          for tsconfig in apps/*/tsconfig.app.json; do
            echo "Checking $tsconfig"
            pnpm tsc -p "$tsconfig" --noEmit
          done
